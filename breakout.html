<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打砖块 Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .game-wrapper { text-align: center; color: #fff; }
  h1 { margin-bottom: 10px; font-size: 28px; letter-spacing: 4px; color: #e94560; }
  .info { display: flex; justify-content: space-between; width: 600px; margin: 0 auto 6px; font-size: 16px; }
  canvas { background: #16213e; border: 2px solid #0f3460; border-radius: 6px; display: block; cursor: none; }
  .tip { margin-top: 10px; color: #888; font-size: 13px; }
  .end-screen {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.75);
    justify-content: center; align-items: center;
    z-index: 100; animation: fadeIn 0.4s ease;
  }
  .end-screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .end-card {
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
    border: 2px solid #0f3460;
    border-radius: 16px; padding: 40px 50px;
    text-align: center; color: #fff;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    min-width: 360px;
  }
  .end-card .icon { font-size: 56px; margin-bottom: 12px; display: block; }
  .end-card .title { font-size: 32px; font-weight: 700; margin: 8px 0; letter-spacing: 2px; }
  .end-card .title.over { color: #e94560; }
  .end-card .title.win { color: #4cd137; }
  .end-card .divider { width: 60px; height: 3px; border-radius: 2px; margin: 16px auto; }
  .end-card .divider.over { background: #e94560; }
  .end-card .divider.win { background: #4cd137; }
  .end-card .stats { margin: 16px 0 24px; }
  .end-card .stat-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .end-card .stat-row .label { color: #888; }
  .end-card .stat-row .value { color: #fff; font-weight: 600; }
  .end-card .stat-row .value.highlight { color: #f5a623; }
  .btn-restart {
    display: inline-block; padding: 12px 36px;
    background: linear-gradient(135deg, #e94560, #b0304a);
    border: none; border-radius: 8px; color: #fff; font-size: 17px;
    font-weight: 600; cursor: pointer; letter-spacing: 1px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(233, 69, 96, 0.35);
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(233, 69, 96, 0.5); }
  .btn-restart:active { transform: translateY(0); }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>打 砖 块</h1>
  <div class="info">
    <span>❤️ 生命：<b id="lives">3</b></span>
    <span>🏆 分数：<b id="score">0</b></span>
    <span>🎯 关卡：<b id="level">1</b></span>
  </div>
  <canvas id="canvas" width="600" height="500"></canvas>
  <div class="tip">← → 或鼠标移动挡板 | 空格开始/暂停 | R 重置</div>
</div>

<!-- 结束界面 -->
<div class="end-screen" id="endScreen">
  <div class="end-card">
    <span class="icon" id="endIcon"></span>
    <div class="title" id="endTitle"></div>
    <div class="divider" id="endDivider"></div>
    <div class="stats">
      <div class="stat-row"><span class="label">最终得分</span><span class="value highlight" id="endScore">0</span></div>
      <div class="stat-row"><span class="label">到达关卡</span><span class="value" id="endLevel">1</span></div>
      <div class="stat-row"><span class="label">剩余生命</span><span class="value" id="endLives">0</span></div>
    </div>
    <button class="btn-restart" id="btnRestart">🔄 再来一局</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const livesEl = document.getElementById('lives');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const STATE = { IDLE: 0, PLAYING: 1, PAUSED: 2, OVER: 3, WIN: 4 };
let gameState = STATE.IDLE;
let score = 0, lives = 3, level = 1;
const paddle = { w: 100, h: 14, x: 250, y: 460, speed: 8 };
const ball = { r: 7, x: 300, y: 440, dx: 4, dy: -4, speed: 5 };
let bricks = [];
const brickRowCount = 6, brickColCount = 9;
const brickW = 58, brickH = 22, brickPad = 4;
const brickOffsetTop = 60, brickOffsetLeft = 21;
const brickColors = ['#e94560','#f5a623','#f7d794','#4cd137','#00a8ff','#9c88ff'];
let particles = [];

function buildBricks() {
  bricks = [];
  for (let r = 0; r < brickRowCount; r++) {
    bricks[r] = [];
    for (let c = 0; c < brickColCount; c++) bricks[r][c] = { alive: true };
  }
}
function resetBall() {
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ball.r - 2;
  const angle = (Math.random() * 0.6 + 0.2) * Math.PI;
  ball.dx = ball.speed * Math.cos(angle) * (Math.random() > 0.5 ? 1 : -1);
  ball.dy = -ball.speed * Math.sin(angle);
}
function resetAll() {
  score = 0; lives = 3; level = 1; ball.speed = 5; paddle.w = 100;
  paddle.x = (canvas.width - paddle.w) / 2;
  buildBricks(); resetBall(); particles = []; gameState = STATE.IDLE; updateUI(); hideEndScreen();
}
function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4 - 1,
      life: 1, decay: 0.02 + Math.random() * 0.04, color, size: 2 + Math.random() * 3
    });
  }
}
function updateUI() { livesEl.textContent = lives; scoreEl.textContent = score; levelEl.textContent = level; }
function nextLevel() {
  level++; ball.speed += 0.8; paddle.w = Math.max(60, paddle.w - 6);
  buildBricks(); resetBall(); gameState = STATE.IDLE; updateUI();
}
function ballPaddleHit() {
  return ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w &&
         ball.y + ball.r >= paddle.y && ball.y - ball.r <= paddle.y + paddle.h;
}
function update() {
  if (gameState !== STATE.PLAYING) return;
  ball.x += ball.dx; ball.y += ball.dy;
  if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = -ball.dx; }
  if (ball.x + ball.r >= canvas.width) { ball.x = canvas.width - ball.r; ball.dx = -ball.dx; }
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = -ball.dy; }
  if (ballPaddleHit()) {
    ball.y = paddle.y - ball.r;
    const hitPos = (ball.x - paddle.x) / paddle.w;
    const angle = (hitPos - 0.5) * Math.PI * 0.7;
    const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    ball.dx = spd * Math.sin(angle);
    ball.dy = -spd * Math.cos(angle);
  }
  if (ball.y - ball.r > canvas.height) {
    lives--; updateUI();
    if (lives <= 0) { gameState = STATE.OVER; showEndScreen(false); return; }
    resetBall(); gameState = STATE.IDLE; return;
  }
  let allDead = true;
  for (let r = 0; r < brickRowCount; r++) {
    for (let c = 0; c < brickColCount; c++) {
      const b = bricks[r][c];
      if (!b.alive) continue;
      allDead = false;
      const bx = c * (brickW + brickPad) + brickOffsetLeft;
      const by = r * (brickH + brickPad) + brickOffsetTop;
      if (ball.x + ball.r > bx && ball.x - ball.r < bx + brickW &&
          ball.y + ball.r > by && ball.y - ball.r < by + brickH) {
        const ol = (ball.x + ball.r) - bx, or = (bx + brickW) - (ball.x - ball.r);
        const ot = (ball.y + ball.r) - by, ob = (by + brickH) - (ball.y - ball.r);
        if (Math.min(ol, or) < Math.min(ot, ob)) ball.dx = -ball.dx; else ball.dy = -ball.dy;
        b.alive = false;
        score += 10 * level;
        spawnParticles(bx + brickW / 2, by + brickH / 2, brickColors[r]);
        updateUI();
      }
    }
  }
  if (allDead) { if (level >= 5) { gameState = STATE.WIN; showEndScreen(true); } else nextLevel(); }
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay; return p.life > 0;
  });
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function darken(hex, f) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgb(' + Math.floor(r*f) + ',' + Math.floor(g*f) + ',' + Math.floor(b*f) + ')';
}
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pg = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pg.addColorStop(0, '#e94560'); pg.addColorStop(1, '#b0304a');
  ctx.fillStyle = pg; roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7); ctx.fill();
  const bg = ctx.createRadialGradient(ball.x-2, ball.y-2, 0, ball.x, ball.y, ball.r);
  bg.addColorStop(0, '#fff'); bg.addColorStop(0.6, '#e94560'); bg.addColorStop(1, '#8b1a35');
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fillStyle = bg; ctx.fill();
  for (let r = 0; r < brickRowCount; r++) {
    for (let c = 0; c < brickColCount; c++) {
      if (!bricks[r][c].alive) continue;
      const bx = c * (brickW + brickPad) + brickOffsetLeft;
      const by = r * (brickH + brickPad) + brickOffsetTop;
      const bg = ctx.createLinearGradient(bx, by, bx, by + brickH);
      bg.addColorStop(0, brickColors[r]); bg.addColorStop(1, darken(brickColors[r], 0.5));
      ctx.fillStyle = bg; roundRect(bx, by, brickW, brickH, 4); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.stroke();
    }
  }
  particles.forEach(p => {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  if (gameState === STATE.IDLE) drawOverlay('按空格键开始', '#fff');
  else if (gameState === STATE.PAUSED) drawOverlay('已暂停', '#f5a623');
}
function showEndScreen(isWin) {
  const screen = document.getElementById('endScreen');
  const icon = document.getElementById('endIcon');
  const title = document.getElementById('endTitle');
  const divider = document.getElementById('endDivider');
  document.getElementById('endScore').textContent = score;
  document.getElementById('endLevel').textContent = level;
  document.getElementById('endLives').textContent = lives;
  if (isWin) {
    icon.textContent = '🏆';
    title.textContent = '恭喜通关！';
    title.className = 'title win';
    divider.className = 'divider win';
  } else {
    icon.textContent = '💔';
    title.textContent = '游戏结束';
    title.className = 'title over';
    divider.className = 'divider over';
  }
  screen.classList.add('active');
}
function hideEndScreen() {
  document.getElementById('endScreen').classList.remove('active');
}
function drawOverlay(text, color) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = color; ctx.font = 'bold 28px "Segoe UI", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === STATE.IDLE) gameState = STATE.PLAYING;
    else if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
    else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
  }
  if (e.key === 'r' || e.key === 'R') resetAll();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  paddle.x = e.clientX - rect.left - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
  if (gameState === STATE.IDLE) ball.x = paddle.x + paddle.w / 2;
});
function handleKeys() {
  if (keys['ArrowLeft'] || keys['a']) {
    paddle.x -= paddle.speed;
    if (paddle.x < 0) paddle.x = 0;
    if (gameState === STATE.IDLE) ball.x = paddle.x + paddle.w / 2;
  }
  if (keys['ArrowRight'] || keys['d']) {
    paddle.x += paddle.speed;
    if (paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;
    if (gameState === STATE.IDLE) ball.x = paddle.x + paddle.w / 2;
  }
  requestAnimationFrame(handleKeys);
}
resetAll(); loop(); handleKeys();
document.getElementById('btnRestart').addEventListener('click', resetAll);
</script>
</body>
</html>
