<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;user-select:none}
#container{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#pet-svg{width:176px;height:176px;pointer-events:none;transition:opacity 0.25s ease}
#pet-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-family:Segoe UI,sans-serif;font-size:9px;color:rgba(100,100,100,0.5);pointer-events:none;opacity:0;transition:opacity 0.3s}
#pet-bubble{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  max-width:180px;padding:5px 10px;
  background:rgba(255,255,255,0.92);border-radius:10px;
  font-family:Segoe UI,sans-serif;font-size:11px;color:#333;
  pointer-events:none;opacity:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
  transition:opacity 0.3s ease;
  text-align:center;word-break:break-word;line-height:1.3;
  animation:pet-bubble-breathe 2s ease-in-out infinite;
}
@keyframes pet-bubble-breathe{
  0%,100%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.03)}
}
</style>
</head>
<body>
<div id="container"><object id="pet-svg" type="image/svg+xml" data="clawd/clawd-idle-follow.svg"></object></div>
<div id="pet-bubble"></div>
<div id="pet-label"></div>
<script src="pet-renderer.js"></script>
</body>
</html>
